name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: exam052026
  IMAGE_TAG: latest
  DOCKER_REGISTRY: docker.io

jobs:

  # ===============================
  # JOB 1 - CI : BUILD + PUSH + SCAN
  # ===============================
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Display variables
        run: |
          echo "IMAGE_NAME: $IMAGE_NAME"
          echo "IMAGE_TAG: $IMAGE_TAG"
          echo "DOCKER_REGISTRY: $DOCKER_REGISTRY"

      - name: Login to Docker Hub
        run: |
          echo "dckr_pat_YeneybrEjj0xxRzOSQwBCC0Wyj8" | \
          docker login -u "ryotac7" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ryotac7/exam052026:latest .

      - name: Verify image
        run: |
          docker image ls | grep ryotac7/exam052026

      - name: Push Docker image
        run: |
          docker push ryotac7/exam052026:latest

  # ===============================
  # JOB 2 - CD : DEPLOY
  # ===============================
  deploy:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest image
        run: |
          echo "Hello deploy"

      - name: Pull latest image
        run: |
          docker pull ryotac7/exam052026:latest

      - name: Stop existing container  
        run: |
          docker stop ci-app || true

      - name: Remove old container
        run: |
          docker rm ci-app || true

      - name: Run new container
        run: |
          docker run -d \
            -p 80:80 \
            --name ci-app \
            ryotac7/exam052026:latest 
